---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embargo-butler-enqueue
  labels:
    app: enqueue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enqueue
  template:
    metadata:
      labels:
        app: enqueue
    spec:
      containers:
      - name: enqueue
        image: "ghcr.io/lsst-dm/embargo-butler-enqueue:prod"
        imagePullPolicy: Always
        env:
        - name: PROFILE
          value: embargo
        - name: DATASET_REGEXP
          value: '\.fits$'
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis
              key: redis-password
        - name: KAFKA_CLUSTER
          value: "172.24.10.54:9094"
        - name: KAFKA_TOPIC
          value: "rubin-summit-notification-8"
        - name: KAFKA_GROUP_ID
          value: "embargo-butler-enqueue-summit"
        resources:
          limits:
            cpu: "1"
