# usdf-embargo-dmz-dev: embargo-butler stack in Kubernetes namespace `test`.
# Service source and trigger script: https://github.com/lsst-dm/embargo-butler
# Testing workflow: see DEVELOPER-TESTING.md in this directory.
images:
  - name: ghcr.io/lsst-dm/embargo-butler-enqueue
    newTag: "1.3.3"
  - name: ghcr.io/lsst-dm/embargo-butler-ingest
    newTag: "DM-54386"
  - name: ghcr.io/lsst-dm/embargo-butler-idle
    newTag: "1.3.3"
  - name: ghcr.io/lsst-dm/embargo-butler-presence
    newTag: "1.3.3"
  - name: docker.io/redis
    newTag: "7.4.4"

namespace: test

resources:
  - ns.yaml
  - enqueue-deploy.yaml
  - idle-deploy.yaml
  - ingest-deploy.yaml
  - presence-deploy.yaml
  - redis-deploy.yaml

secretGenerator:
  - name: s3
    files:
      - profile=etc/.secrets/profile
  - name: redis
    files:
      - redis-password=etc/.secrets/redis
  - name: notification
    files:
      - secret=etc/.secrets/notification
